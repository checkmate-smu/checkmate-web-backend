spring:
  application:
    name: checkmate-web-backend

  datasource:
    url: jdbc:postgresql://${SUPABASE_HOST}:${SUPABASE_PORT:5432}/${SUPABASE_DB}
    username: ${SUPABASE_USER}
    password: ${SUPABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  security:
    user:
      name: admin
      password: ${ADMIN_PASSWORD:admin}

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    com.checkmate.web: DEBUG
    org.hibernate.SQL: DEBUG
